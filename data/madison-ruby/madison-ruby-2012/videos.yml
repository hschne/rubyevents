- id: "jeff-casimir-madison-ruby-2012"
  title: "Workshop: Ruby Jumpstart - Introduction to Ruby"
  kind: "workshop"
  date: "2012-08-23"
  video_provider: "not_recorded"
  video_id: "jeff-casimir-madison-ruby-2012"
  description: |-
    An introduction to Ruby with Jeff Casimir. If you're looking for your first introduction to programming this is the course for you. You'll jump right in and write code. The Level 1 course is an introduction to Ruby, data structures, flow control, conditions, basic I/O, and manipulating data. No prior programming experience is necessary.

    We'll work on an "Extract-Translate-Load" (ETL) project, starting with a file full of spreadsheet data, manipulating individual elements, generating form letters, and looking up Congressional district data via a web-based API.
  speakers:
    - Jeff Casimir

- id: "matthew-mccullough-madison-ruby-2012"
  title: "Workshop: Advanced Git"
  kind: "workshop"
  date: "2012-08-23"
  video_provider: "not_recorded"
  video_id: "matthew-mccullough-madison-ruby-2012"
  description: |-
    Advanced Git with Matthew McCullough of GitHub. This full day Git workshop takes you beyond the basic edit, add, and commit workflow to deep Git features that benefit developers appreciative of what Git's flexible DVCS model brings to hard-core software development. You'll learn how to harvest and inspect commit-specific merges, leverage interactive rebase, and search through history with precision and speed. Tags, GPG signatures, and other cryptographic integrity features will become clear, and pushing and pulling will be controlled with newfound precision.

    This workshop requires attendees to have basic to intermediate level familiarity with Git.
  speakers:
    - Matthew McCullough

- id: "desi-mcadam-madison-ruby-2012"
  title: "Workshop: RailsBridge Women's Outreach Workshop"
  kind: "workshop"
  date: "2012-08-23"
  video_provider: "not_recorded"
  video_id: "desi-mcadam-madison-ruby-2012"
  description: |-
    A RailsBridge Women's Outreach Workshop. The target audience is anyone who has a laptop computer and is willing to devote a Wednesday evening and full day on Thursday to learning how to develop a web application using the popular Ruby on Rails framework. Most attendees are programmers who are looking to update their skills — some are unemployed, some are hoping to leave their current jobs and others just want to keep their skills sharp and understand the latest technology.

    Although not exclusively for women, volunteers like Desi McAdam focus their workshops on outreach to women in order to create gender diversity in the tech community.
  speakers:
    - Desi McAdam

