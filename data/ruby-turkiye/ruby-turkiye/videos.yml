  description: |-
    Merhaba,

    Akşam Oturmalarına cevrimiçi olarak kaldığımız yerden devam ediyoruz. Bu buluşmamızda iki konuşmamız olacak.

    Konuşmacı: Serdar Doğruyol

    Başlık: Kemal: Sadelikle Işık Hızında Web Uygulamaları Oluşturun

    Açıklama: Kemal, Ruby'nin popüler web çerçevesi Sinatra'dan ilham alınarak Serdar Doğruyol tarafından geliştirilen, Crystal programlama dili ile yazılmış minimal bir web çerçevesidir. Crystal, Ruby benzeri bir sözdizimi sunarken C benzeri performans sağlar, bu yüzden Kemal de bu performans avantajlarından yararlanır. Kemal, hızlı ve basit web uygulamaları geliştirmek için tasarlanmıştır ve WebSocket, HTTP istekleri, JSON işleme gibi modern web geliştirme özelliklerini destekler. Ayrıca, statik dosya sunma, güvenlik ayarları ve URL yönlendirme gibi temel web çerçeve özelliklerine sahiptir.

    Konuşmacı: Özgün Koyun

    Başlık: The Waltz of Neovim with Ruby on Rails

    Açıklama: "The Waltz of Neovim with Ruby on Rails," a hands-on demo to enhance your development workflow. We'll start with a brief presentation on Neovim basics and then explore key plugins like Gitsigns, Telescope, ChatGPT, Copilot, neovim-ruby, Solargraph, ruby-lsp, vim-rails, vim-rspec, and Rubocop. Learn how these tools can streamline your Ruby on Rails development, improve productivity, and enhance your coding experience.

    Sizlerde Ruby topluluğu ile tanışmak ve bu ilginç konuları dinlemek isterseniz. Hepinizi bu buluşmaya bekliyoruz.

    Sevgiler ❤️

