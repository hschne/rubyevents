  description: |-
    Stephen Margheim

    Rubyist, Web Developer, and Engineering Manager

    Hey, I’m Stephen. I’m an American expat living in Berlin with my wife and two dogs. I am a contributor to Rails and the sqlite3-ruby gem as well as the maintainer of a handful of gems aimed at making Ruby and Rails the absolute best platforms in the world to run SQLite projects.

    Session

    SQLite has gathered notable momentum this last year in the Rails ecosystem. Rails 8 marks the first release of Rails where SQLite is fully embraced and supported for production workloads across the core components that require persistent data. However, Rails isn’t slowing down, and more work is underway to continue making Rails the very best framework for building full-featured web applications. In this talk, I walk through the major changes that make SQLite on Rails the lovely experience it is today as well as the future innovations on the horizon.

