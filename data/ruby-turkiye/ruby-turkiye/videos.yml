    Ruby ile çalisan çoğu kişi dinamik olarak metod çağırmayı veya statik olarak kodda olmayan, dinamik olarak yaratılan metodları en az bir kere deneyimlemiştir (Rails kullanıyorsanız 100%). Fakat Ruby programlarımızda dinamik olarak yapabileceğimiz daha pek çok şey var. Çalışan programınızdaki sınıfların üst sınıflarını, tüm mix-in'lerini, tüm metodlarını ve altında tanımlı olan tüm sınıf ve modulleri listemek, bunlarda değişiklik yapmak da hepimizin alet kutusunda olması gereken yetekenlerden biri. Gelin hep birlikte Ruby ile Introspection ve Reflection nasıl yapılıyor bakalım.
    Ufuk Kayserilioğlu @ Shopify

    * org-mode ile neler yapabiliriz/edebiliriz
    İş notlarımız, projelerimiz, üzerine çalıştığımız polisiye roman, yapılacaklar listesi ya da doğumgünü tarihleri için tek bir araç kullansak ne güzel olurdu değil mi? O zaman çok güzel çünkü org-mode var! Ustelik bunların hepsini kaydını da düz metin dosyalarında tutuyor. Emacs'in en popüler(muhtemelen) moduyla tanışma sunumunda görüşürüz!:wave:
    Not: Emacs'e aşinalık pek de gerekli değildir.
    Çağrı Özkan @ Bitenta Yazılım

    Herkesi bekliyoruz.

