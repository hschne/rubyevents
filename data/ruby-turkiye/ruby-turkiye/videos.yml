    Akşam Oturmalarına kaldığımız yerden devam ediyoruz.

    Bu buluşmamızda Çağrı Özkan bizlere Don't Stop Representin' - Journey of Service Responses as Value Objects başlıklı bir konuşma verecek.

    İçerik: Value object nedir? Ne değildir? Nerelerde kullanılabilir? Martin Fowler'in ortaya attığı "Value Object" kavramından ve Ruby on Rails projelerine nasıl implemente edilebileciğinden bahsedebilecek. Ruby on Rails'de "Service Object Response" olarak geçen kavramın,  Value Object'in OpenStruct, Struct, PORO, ve Data'yla devam eden serüvenini ve gelişimini biraz da Çağrı kendi kişisel meslek hayatındaki gözlemleri ile bizlere anlatacak.

    Ruby programala diline ilgi duyuyorsanız ya da toplulukta neler oluyor merak ediyorsanız, sizleri de buluşmamıza bekliyoruz.

    Sevgiler ❤️

    Lab2023'e bu etkinliğimize sponsor oldukları için teşekkür ederiz.

