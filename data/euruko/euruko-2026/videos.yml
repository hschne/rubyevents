- id: "hana-harencarova-euruko-2026"
  title: "How to Ship 1000+ Commits to a Rails Monolith Daily"
  event_name: "EuRuKo 2026"
  date: "2026-09-17"
  announced_at: "2026-07-01"
  video_provider: "scheduled"
  video_id: "hana-harencarova-euruko-2026"
  description: |-
    Rails allows us to move quickly during development, but true speed comes from being able to deliver those changes to customers just as fast. At GitHub, we've built a deployment process that enables us to ship hundreds of commits to our Rails monolith every day — reliably, safely, and without unnecessary friction. In this talk, we'll walk through the practical strategies and tooling we use to make this possible: from encouraging small, incremental changes to automating validation, testing, and deployment.
  speakers:
    - Hana Harenčárová

- id: "chris-hasinski-euruko-2026"
  title: "From C to Ruby: Porting Doom"
  date: "2026-09-16"
  language: "English"
  video_provider: "scheduled"
  video_id: "chris-hasinski-euruko-2026"
  description: |-
    Doom is a 3D engine operating on 2D maps, with dynamic lighting, sprites, and variable floor heights — a rich real-time, CPU-bound workload. This talk shows how to port a large C codebase to Ruby, validating correctness via frame comparison and measuring performance.
  speakers:
    - Chris Hasiński

- id: "ivo-anjo-euruko-2026"
  title: "What lies beneath your Ruby app"
  date: "2026-09-16"
  language: "English"
  video_provider: "scheduled"
  video_id: "ivo-anjo-euruko-2026"
  description: |-
    In this talk, we're going to look inside the Ruby VM to reveal the answer: We'll journey from text file to running program, uncovering how Ruby parses your code, compiles it to bytecode, interprets it step by step, and even uses a Just-In-Time (JIT) compiler for extra speed. By the end, you won't (yet) be a Ruby core developer, but this black box we call "ruby" will look a lot more transparent.
  speakers:
    - Ivo Anjo

- id: "satoshi-tagomori-euruko-2026"
  title: "Stacking Boxes"
  date: "2026-09-16"
  language: "English"
  video_provider: "scheduled"
  video_id: "satoshi-tagomori-euruko-2026"
  description: |-
    Ruby Box is a new feature introduced in Ruby 4.0, and also being developed recently. The separation/isolation realized by Ruby Box is useful for development, deployment and testing. I will explain what Ruby Box is, when we can use it, and why Ruby developers should try this feature.
  speakers:
    - Satoshi Tagomori

- id: "tim-kaechele-euruko-2026"
  title: "Parsing: it's more than a regex"
  date: "2026-09-16"
  language: "English"
  video_provider: "scheduled"
  video_id: "tim-kaechele-euruko-2026"
  description: |-
    Whether it is that pesky RuboCop rule you don't like or great developer tools, you encounter parsers everywhere. While parsers always appear to be mythical pieces of software brought to you by computer science gods, I can assure you they are easier to write than you think. Let's build our own little parser and learn the basics of parsing along the way.
  speakers:
    - Tim Kächele

- id: "benoit-daloze-euruko-2026"
  title: "Running Native Extensions and Ruby Code in Parallel Threads"
  date: "2026-09-16"
  language: "English"
  video_provider: "scheduled"
  video_id: "benoit-daloze-euruko-2026"
  description: |-
    In this talk we show how we are running native extensions in threads running in parallel, what conditions are needed for that and how to make your own native extension compatible with parallel execution. We also look at what it takes to run Ruby code in parallel, including making Hash parallel, thread-safe and fast. This is using Threads and not Ractors, so it's compatible with most gems without changing the programming model.
  speakers:
    - Benoit Daloze

- id: "charles-oliver-nutter-euruko-2026"
  title: "JRuby Past, Present, and Future"
  date: "2026-09-16"
  language: "English"
  video_provider: "scheduled"
  video_id: "charles-oliver-nutter-euruko-2026"
  description: |-
    JRuby on Rails is 20 years old! This talk will review the last 20 years of JRuby development, with a focus on the challenges of supporting Ruby and Rails year after year. We'll look at the state of the art features that make JRuby attractive and talk about the next generation of JRuby capabilities and applications. JRuby brings a whole new world of opportunities to Ruby — come learn how to use JRuby to Do More with Ruby!
  speakers:
    - Charles Oliver Nutter
