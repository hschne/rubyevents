- id: "nick-schwaderer-rubykaigi-2022"
  title: "Ruby Archaeology: Forgotten web frameworks"
  raw_title: "[EN]Ruby Archaeology: Forgotten web frameworks / Nick Schwaderer @schwad_rb"
  event_name: "RubyKaigi 2022"
  date: "2022-09-08"
  published_at: "2022-10-25T05:40:54Z"
  language: "English"
  slides_url: "https://schwaderer-kaigi-2022.herokuapp.com/#3"
  video_provider: "youtube"
  video_id: "0h9lISoqEn4"
  description: |-
    In the 2000's everyone was writing a Ruby web framework

    Today, it seems, we are all too content to focus our energy on a small number of large Ruby web projects. What happened to our creative spirit?

    In this talk we will focus on old Ruby web frameworks that have long gone by the wayside. I won't spoil the frameworks here, but I can tell you what
    we won't be covering:

    - Sinatra
    - Hanami
    - Camping.rb
    - roda
    - grape
    - merb

    We will answer questions like:

    - Why are fewer people experimenting with their own frameworks today?
    - What features, idioms and ideas are worth exploring?
    - Are any of these frameworks worth reviving or copying?

    RubyKaigi 2022: https://rubykaigi.org/2022/presentations/schwad_rb.html
  speakers:
    - Nick Schwaderer

