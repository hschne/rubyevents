- id: "packet-analysis-with-mruby-on-wireshark-druby-as-example-uncut-version-rubykaigi-2022"
  old_id: "misaki-shioi-rubykaigi-2022-uncut"
  title: "Packet analysis with mruby on Wireshark - dRuby as example (Uncut version)"
  raw_title: "[JA][uncut]Packet analysis with mruby on Wireshark - dRuby as example - Misaki Shioi @coe401_"
  event_name: "RubyKaigi 2022"
  date: "2022-09-08"
  published_at: "2022-11-04T05:17:21Z"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/coe401_/packet-analysis-with-mruby-on-wireshark-druby-as-example"
  video_provider: "youtube"
  video_id: "71oVELdmR8U"
  description: |-
    Wireshark is a very popular network traffic analyzer that supports not only many popular network protocols, but also custom protocols by adding an extension plugin called "dissector".'

    Currently, Wireshark provides APIs to develop dissectors in Lua and C only. It’s a little disappointing for us Rubyists, we cannot write Ruby for developing Wireshark dissectors.

    So I have created an extension for Wireshark that makes it possible to easily add dissector by writing a configuration file via Ruby DSL, allowing you to analyze any protocols.

    It is accomplished by embedding mruby into Wireshark and wrapping Wireshark’s C API with Ruby.

    This presentation will show its usage and implementation, and as an example, how to analyze dRuby (familiar to all Rubyists!) packets.

    RubyKaigi 2022: https://rubykaigi.org/2022/presentations/coe401_.html
  speakers:
    - Misaki Shioi

- id: "yasuko-ohba-rubykaigi-2022"
  title: "The Better RuboCop World to enjoy Ruby"
  raw_title: "[JA]The Better RuboCop World to enjoy Ruby / Yasuko Ohba @nay3"
  event_name: "RubyKaigi 2022"
  date: "2022-09-08"
  published_at: "2022-11-11T16:17:01Z"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/nay3/the-better-rubocop-world-to-enjoy-ruby"
  video_provider: "youtube"
  video_id: "_QY5GMVhG1c"
  description: |-
    Tools like RuboCop are very useful. I am very grateful for contributors.

    I think it's really helpful to keep our code clean and consistent.

    However, sometimes I feel there is a gap between 'Cop' culture and Ruby culture. In general, 'Cop' restricts our rights though Ruby gives freedom to us.

    I understand we have right not to use RuboCop or disable some Cops. But it is not very easy in reality, especially for Ruby beginners in their teams. To make them happier, experts would be able to set up config perfectly. But again, it is not very easy in reality. As a result, even though there is no evil, in some case people wrongfully make detour and give up their creativeness to keep CI green. It's a pity, isn't it?

    In this talk, I introduce my thoughts on RubyCop and programming and some idea of a bit better RuboCop world, with lower risk to damage productivity and to misguide beginners.

    RubyKaigi 2022: https://rubykaigi.org/2022/presentations/nay3.html
  speakers:
    - Yasuko Ohba

- id: "error_highlight-user-friendly-error-diagnostics-rubykaigi-2022"
  old_id: "yusuke-endoh-rubykaigi-2022-errorhighlight-user-friendly-e"
  title: "error_highlight: user-friendly error diagnostics"
  raw_title: "[JA]error_highlight: user-friendly error diagnostics / Yusuke Endoh @mametter"
  event_name: "RubyKaigi 2022"
  date: "2022-09-08"
  published_at: "2022-11-11T16:19:11Z"
  language: "Japanese"
  slides_url: "https://www.slideshare.net/mametter/errorhighlight-userfriendly-error-diagnostics"
  video_provider: "youtube"
  video_id: "SfFmhunJTEQ"
  description: |-
    Ruby 3.1 has introduced a gem called "error_highlight", which shows a code snippet with an underline to spot where NameError or NoMethodError was raised.

    $ ruby test.rb
    test.rb:1:in `<main>': undefined method `[]' for nil:NilClass (NoMethodError)

    json[:foo][:bar]
              ^^^^^^

    We will talk about the design and implementation of error_highlight: how it works, why and how we designed it, how we resolved the difficulties we faced during implementation, and the feedback we received.

    This feature goes further in Ruby 3.2: more error support other than NameError/NoMethodError and more fine-grained error spotting.

    We also redesigned its backend by introducing a new API, Exception#detailed_message, which allows us to enhance error messages with fewer incompatibilities. In fact, it allowed simple integration with other error message extensions such as did_you_mean and dead_end.

    We will also talk about what we would like users to help us with to make error_highlight better.

    RubyKaigi 2022: https://rubykaigi.org/2022/presentations/mametter.html
  speakers:
    - Yusuke Endoh

- id: "uchio-kondo-rubykaigi-2022"
  title: "Ruby x BPF in Action: How important observability is"
  raw_title: "[EN]Ruby x BPF in Action: How important observability is / Uchio KONDO @udzura"
  event_name: "RubyKaigi 2022"
  date: "2022-09-08"
  published_at: "2022-11-04T05:15:46Z"
  language: "English"
  slides_url: "https://speakerdeck.com/udzura/rubykaigi-2022"
  video_provider: "youtube"
  video_id: "9OvoOVc8690"
  description: |-
    Do you like to measure your code? When it comes to applications that you write mainly in Ruby, there are powerful observability tools such as stackprof, but what about observability outside the Ruby world such as C, C++ and Rust? BPF will be perfect for solving those problems.

    So, what is BPF? BPF is one of the emerging technologies for Linux. The talk focuses on what the BPF is for the audiences who are new to BPF. I will give a brief history and basic concepts at first. And I will also illustrate its strong points and restrictions compared to existing tools (e.g. strace or perf); The talk will also cover the relationship between the various tools related to BPF (you might have heard of BCC, bpftrace, RbBCC, Rucy, etc.).

    In addition, I will give examples of BPF use cases applied for smaller or PoC Ruby applications. Finally, practical performance measurement and tuning cases using BPF based on several Rust-based Rubygems (owned by the author) will be introduced.

    RubyKaigi 2022: https://rubykaigi.org/2022/presentations/udzura.html
  speakers:
    - Uchio KONDO

- id: "matt-valentine-house-rubykaigi-2022"
  title: "Heaping on the complexity! An adventure in GC Compaction"
  raw_title: "[EN]Heaping on the complexity! An adventure in GC Compaction / Matt Valentine-House @eightbitraptor"
  event_name: "RubyKaigi 2022"
  date: "2022-09-08"
  published_at: "2022-11-04T05:20:07Z"
  language: "English"
  slides_url: "https://www.eightbitraptor.com/presentations/RubyKaigi-2022-mvh.pdf"
  video_provider: "youtube"
  video_id: "bHDHeFXm9kg"
  description: |-
    Recently some changes were made to the way Ruby stores objects of different sizes in memory. These changes impacted the way that the compaction handles fragmented memory inside the Ruby garbage collector.

    In this talk I'll introduce the concepts of memory fragmentation and compacting GC's and discuss how Ruby implements compaction. I'll explore the consequences of the recent memory changes and take you on the journey I went on to explore some potential solutions, as well as the approach I eventually settled on.

    Along the way we'll see some techniques to inspect Ruby's memory and introduce a tool I built, heapviz, that visualises the Ruby object space, allowing us to see the effect of compaction.

    RubyKaigi 2022: https://rubykaigi.org/2022/presentations/eightbitraptor.html
  speakers:
    - Matt Valentine-House

- id: "jeremy-evans-rubykaigi-2022"
  title: "Fixing Assignment Evaluation Order"
  raw_title: "[EN]Fixing Assignment Evaluation Order / Jeremy Evans @jeremyevans0"
  event_name: "RubyKaigi 2022"
  date: "2022-09-08"
  published_at: "2022-11-11T16:19:10Z"
  language: "English"
  slides_url: "https://code.jeremyevans.net/presentations/rubykaigi2022/index.html"
  video_provider: "youtube"
  video_id: "oqvFi7crbd4"
  description: |-
    For a long time, Ruby's assignment evaluation order was inconsistent. Normal assignment would evaluate the left hand side before the right hand side, but multiple assignment and constant assignment would evaluate the right hand side first. This issue was known since before the release of Ruby 1.9.3, but it was considered difficult to fix. Come learn how we fixed evaluation order for multiple assignment in Ruby 3.1, and evaluation order for constant assignment in Ruby 3.2.

    RubyKaigi 2022: https://rubykaigi.org/2022/presentations/jeremyevans0.html
  speakers:
    - Jeremy Evans

