- id: "osyo-manga-rubykaigi-2022"
  old_id: "osyo-rubykaigi-2022"
  title: "Let's collect type info during Ruby running and automaticall"
  raw_title: "[JA]Let's collect type info during Ruby running and automaticall / osyo @pink_bangbi"
  event_name: "RubyKaigi 2022"
  date: "2022-09-08"
  published_at: "2022-11-11T16:17:01Z"
  language: "Japanese"
