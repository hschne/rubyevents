- id: "koichi-sasada-rubykaigi-2023"
  title: "Ractor reconsidered"
  raw_title: "[EN] Ractor reconsidered / Koichi Sasada @ko1"
  event_name: "RubyKaigi 2023"
  date: "2023-05-11"
  published_at: "2023-06-09T15:21:02Z"
