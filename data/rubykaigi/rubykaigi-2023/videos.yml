- id: "samuel-williams-rubykaigi-2023"
  title: "Unleashing the Power of Asynchronous HTTP with Ruby"
  raw_title: "[EN] Unleashing the Power of Asynchronous HTTP with Ruby / Samuel Williams @ioquatix"
  event_name: "RubyKaigi 2023"
  date: "2023-05-11"
  published_at: "2023-06-09T15:23:25Z"
  language: "English"
  slides_url: "https://github.com/ioquatix/presentations/blob/main/2023/Unleashing%20the%20Power%20of%20Asynchronous%20HTTP.pdf"
  video_provider: "youtube"
  video_id: "SKNhyqHmqUo"
  description: |-
    The Hyper Text Transfer Protocol (HTTP) underpins the vast majority of Ruby web applications, but its details are often hidden from the application layer. In this session, we will explore the inner workings of the HTTP protocol, its evolution from HTTP/0.9 to HTTP/3, and the various interfaces and implementations offered for HTTP clients and servers for the Ruby programming language. Additionally, we will delve into the world of Asynchronous HTTP, examining its key concepts and benefits, and learn how to leverage its power within Ruby to build fast, scalable, and efficient web applications. From understanding the history of HTTP, to implementing best practices for Asynchronous HTTP, this presentation is a starting point for anyone looking to improve their Ruby web development skills. Unleash the power of Asynchronous HTTP with Ruby.

    RubyKaigi 2023: https://rubykaigi.org/2023/presentations/ioquatix.html
  speakers:
    - Samuel Williams

- id: "kevin-menard-rubykaigi-2023"
  title: "Rethinking Strings"
  raw_title: "[EN] Rethinking Strings / Kevin Menard @nirvdrum"
  event_name: "RubyKaigi 2023"
  date: "2023-05-11"
  published_at: "2023-06-09T15:23:25Z"
  language: "English"
  slides_url: "https://speakerdeck.com/nirvdrum/rethinking-strings"
  video_provider: "youtube"
  video_id: "a1xvhB8jndQ"
  description: |-
    Ruby strings serve two distinct purposes: the representation of textual data and the representation of binary data. These two use cases generally require different operations, but today they're both accessible via String. Combining the two creates a discoverability issue and can be error-prone. Many String operations have no logical meaning for arbitrary binary data. Having to use strings with a special encoding to pass binary data around is a non-obvious solution and hampers Ruby's usability. Moreover, binary data can sometimes look like ASCII text, which may help build false trust in code with logic errors. Such errors are nuanced and difficult to debug.

    This talk takes a high-level look at Ruby's strings and encodings, highlighting potentially problematic areas and suggesting ways to improve. While the emphasis is on the logical interface for text and binary data, we'll also look at the performance ramifications of the current design and how that might improve as well.

    RubyKaigi 2023: https://rubykaigi.org/2023/presentations/nirvdrum.html
  speakers:
    - Kevin Menard

