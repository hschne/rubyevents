- id: "hirokazu-suzuki-rubykaigi-2023"
  title: "The Adventure of RedAmber - A data frame library in Ruby"
  raw_title: "[JA] The Adventure of RedAmber - A data frame library in Ruby / Hirokazu SUZUKI @heronshoes"
  event_name: "RubyKaigi 2023"
  date: "2023-05-11"
  published_at: "2023-06-09T15:23:25Z"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/heronshoes/the-adventure-of-redamber-a-data-frame-library-in-ruby"
  video_provider: "youtube"
  video_id: "MZxDBDRUu6I"
  description: |-
    RedAmber is a data frame library written in Ruby. Its goal is to allow data frame processing to be written in a Ruby-like manner. RedAmber utilizes Red Arrow, a Ruby implementation of Apache Arrow which aims to build a language-independent data processing infrastructure based on the columnar format. Development of RedAmber began in April 2022 and has completed implementation of key features and significant code revisions. In this presentation, I plan to introduce the significance of

    RedAmber in the field of data processing with Ruby, its unique features not found in other libraries, and future improvements. I would also like to share my message to the Ruby community from my experience as a novice OSS developer in the process of creating RedAmber.

    RubyKaigi 2023: https://rubykaigi.org/2023/presentations/heronshoes.html
  speakers:
    - Hirokazu SUZUKI

- id: "sutou-kouhei-rubykaigi-2023"
  title: "Ruby + ADBC - A single API between Ruby and DBs"
  raw_title: "[JA] Ruby + ADBC - A single API between Ruby and DBs / Sutou Kouhei @ktou"
  event_name: "RubyKaigi 2023"
  date: "2023-05-11"
  published_at: "2023-06-09T15:23:25Z"
  language: "Japanese"
  slides_url: "https://slide.rabbit-shocker.org/authors/kou/rubykaigi-2023/"
  video_provider: "youtube"
  video_id: "vwEiRTK32Ik"
  description: |-
    ADBC is Apache Arrow Database Connectivity. It provides a API that can connect to different databases by wrapping database specific APIs.

    This is not a new approach. There are existing APIs such as Active Record, Sequel and ODBC. The difference between the existing APIs and ADBC is the focus on large data and performance.

    ADBC is an important part to use Ruby for data processing. We can extract large data from many databases (not only RDBMSs but also data ware houses and so on) and load large data into many databases with ADBC. To use Ruby for data processing, we need data. ADBC helps it.

    RubyKaigi 2023: https://rubykaigi.org/2023/presentations/ktou.html
  speakers:
    - Sutou Kouhei

