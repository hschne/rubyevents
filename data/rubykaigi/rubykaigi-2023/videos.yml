- id: "frederico-linhares-rubykaigi-2023"
  title: "High-performance real-time 3D graphics with Vulkan"
  raw_title: "[EN] High-performance real-time 3D graphics with Vulkan / Frederico Linhares @fredolinhares"
  event_name: "RubyKaigi 2023"
  date: "2023-05-11"
