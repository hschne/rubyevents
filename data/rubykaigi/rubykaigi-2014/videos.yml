- id: "kazuhiro-nishiyama-rubykaigi-2014"
  title: "Archeology of Ruby: Removed Features (Ruby 考古学 消された機能編)"
  raw_title: "Archeology of Ruby: Removed Features (Ruby 考古学 機能編) - RubyKaigi 2014"
  event_name: "RubyKaigi 2014"
  date: "2014-09-19"
  published_at: "2014-10-04T00:10:32Z"
  language: "Japanese"
  track: "Hall A"
  slides_url: "http://slide.rabbit-shocker.org/authors/znz/rubykaigi2014/"
  video_provider: "youtube"
  video_id: "qJ5zAP_j0Hc"
  description: |-
    I've been following the evolution of Ruby since version 1.4. In that time, I've noticed that experimental features are often introduced in development, then removed before Ruby is actually released. Other features are introduced, only to be removed in later Ruby releases. I'd like to talk about such features, and about the history of what I felt were major changes over Ruby's development.

    As a historical overview of Ruby's evolution, I hope this talk will be useful as a reference for anyone planning to make a proposal for a new Ruby feature.

    Ruby の開発を見ていると、開発版で一度実験的に入った機能がリリースされる前にやっぱりなかったことになることも何度かありました。他にも過去のリリースにはあった機能が外されるということもありました。 いったいどのような機能が一度入っては外されていったのかを中心に、大きめの変更だったと感じた機能変更の歴史を紹介したいと思います。

    機能を提案する時にどういうものは既にダメだったので通りにくそうとか、改善した案ならまだ行けそうとか、そういう視点でも参考になるかと思います。
  speakers:
    - Kazuhiro NISHIYAMA

- id: "prathamesh-sonpatki-rubykaigi-2014"
  title: "Deep down fixtures"
  raw_title: "Deep down fixtures - RubyKaigi 2014"
  event_name: "RubyKaigi 2014"
  date: "2014-09-19"
  published_at: "2014-10-04T00:13:43Z"
  language: "English"
  track: "Hall B"
  slides_url: "https://speakerdeck.com/prathamesh/deep-down-fixtures"
  video_provider: "youtube"
  video_id: "AFDwI1oIgxk"
  description: |-
    Rails endorses fixtures to build and maintain test data in our web apps. Fixtures look very easy at first. Just a YAML file and we auto-magically get users(:john) in our tests.

    But..

    As our requirements grow, we start fighting with fixtures. How to get ordered records. How to use my own values for ids, timestamps? How to maintain associations? How to generate on the fly dynamic data?

    Lets seek answers to these questions by going deep down fixtures internals. In the process we will also see how others like FactoryGirl are doing this task of generating and maintaining test data.
  speakers:
    - Prathamesh Sonpatki

- id: "kensuke-nagae-rubykaigi-2014"
  title: "<%= link_to \"bundle\", \"update\" %> - Make \"bundle update\" more fun to review"
  raw_title: "＜%= link_to \"bundle\", \"update\" %＞ - Make \"bundle update\" more fun to review - RubyKaigi 2014"
  event_name: "RubyKaigi 2014"
  date: "2014-09-19"
  published_at: "2014-10-04T00:10:50Z"
  language: "English"
  track: "Hall A"
  slides_url: "https://speakerdeck.com/kyanny/percent-equals-link-to-bundle-update-percent-make-bundle-update-more-fun-to-review"
  video_provider: "youtube"
  video_id: "gfixiM5nomU"
  description: |-
    In modern development environment, developers use pull requests to review all changes of code. "bundle update" generates diff of Gemfile.lock, so why not review it on pull request as well?

    I want to have better experience around "bundle update". At RubyKaigi 2013 [1], I also shared an idea about "bundle update" and pull request integration. But after that, I noticed another problem: the diff of Gemfile.lock is not easy to review.

    In this talk, I will introduce Compare Linker [2], a tool to make GitHub's compare view URL [3] for upgraded and/or downgraded gems from difference of Gemfile.lock.

    I will talk about my challenge to make "bundle update" more fun to review. I will show my solution (what I made), motivation (why I needed it) and implementation (how I solved problem).

    I also will share my precious findings from this challenge.

    - [1] http://rubykaigi.org/2013/talk/S72
    - [2] https://github.com/kyanny/compare_linker
    - [3] https://github.com/blog/612-introducing-github-compare-view
  speakers:
    - Kensuke Nagae

