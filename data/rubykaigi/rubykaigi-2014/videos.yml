  title: "Everything is Broken: A Story of Hope"
  raw_title: "Everything is Broken: A Story of Hope - RubyKaigi 2014"
  event_name: "RubyKaigi 2014"
  date: "2014-09-20"
  published_at: "2014-10-05T01:58:33Z"
  language: "Japanese"
