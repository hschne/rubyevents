- id: "satoshi-egi-rubykaigi-2014"
  title: "Non-Linear Pattern Matching against Unfree Data Types in Ruby (Egison Pattern Matching in Ruby)"
  raw_title: "Non-Linear Pattern Matching against Unfree Data Types in Ruby - RubyKaigi 2014"
  event_name: "RubyKaigi 2014"
  date: "2014-09-18"
  published_at: "2014-10-02T12:17:26Z"
  language: "Japanese"
  track: "Hall A"
  slides_url: "http://www.slideshare.net/rakutentech/ruby-egison"
  video_provider: "youtube"
  video_id: "LC3AJsfjfr8"
  description: |-
    We have designed and implemented the library that realizes non-linear pattern matching against unfree data types. We can directly express pattern-matching against lists, multisets, and sets using this library. The library is already released via RubyGems.org as one of gems.

    The expressive power of this gem derives from the theory behind the Egison programming language and is so strong that we can write poker-hands analyzer in a single pattern matching expression. This is impossible even in any other state-of-the-art programming language.

    Pattern matching is one of the most important features of programming language for intuitive representation of algorithms. Our library simplifies code by replacing not only complex conditional branches but also nested loops with an intuitive pattern-matching expression.

    The source code of the library is open to pubic with sample code. Please check it on GitHub.

    配列やリストだけでなく、多重集合や集合に対しても柔軟なパターンマッチをRubyで行えるようにするライブラリを私は設計・実装しました。

    このパターンマッチは非常に強力な表現力を持ち、例えばポーカーの役判定を行うようなプログラムを1つのパターンマッチ式で記述できます。 このようなパターンマッチは、私が設計・開発したプログラミング言語Egisonを除いて、最先端のプログラミング言語を用いても不可能です。

    パターンマッチはプログラムを直感的に記述するために非常に重要なプログラミング言語の機能です。 私の開発したライブラリを使えば、複雑な条件分岐だけでなく、何重にもネストするループも、パターンマッチを用いて簡潔に記述できるようになります。

    本ライブラリはRubyGems.org経由で簡単にインストールできます。ソースコードはサンプルコードとともにGitHubで公開されています。ぜひ試してみてください。

    (We are planning to talk in Japanese, but slides in English.)
  speakers:
    - Satoshi Egi

- id: "yasuo-honda-rubykaigi-2014"
  title: "Introduce Oracle enhanced adapter for ActiveRecord, another choice for your Rails database."
  raw_title: "Introduce Oracle enhanced adapter for ActiveRecord - RubyKaigi 2014"
  event_name: "RubyKaigi 2014"
  date: "2014-09-18"
  published_at: "2014-10-02T23:44:30Z"
  language: "Japanese"
  track: "Hall B"
  slides_url: "https://speakerdeck.com/yahonda/introduce-oracle-enhanced-adapter-with-rails"
  video_provider: "youtube"
  video_id: "7kwhWaPeoP4"
  description: |-
    Oracle Enhanced Adapter is one of the 3rd party ActiveRecord database adapters. It supports Rails from 2.3 to 4.1. It has been developing well since version 1.5.0 was released on the day same day Rails 4.0.1 was out, November 1st 2013. Now we are on the way to support Rails 4.2.

    In Rails world MySQL and PostgreSQL are two giant databases, Oracle database does not have much presense here. Although it has better features such as good optimizers it also has some non-standard features like handling empty string as NULL. However, this situation has been changing. Finally Oracle 12c implements row limits and offset then developers can write better Top-N queries without dirty subquery and rownum statements. I'll introduce a experimental Arel implementations without ugly order_hacks method.

    I have been working for Oracle enhanced adapter since August 2011, starting from Rails 4 support. It is still the first 3 years. Fortunately I'm still enjoying to do that, yes I'm not burned out yet. I'm sorry that I have nothing to do with your license fee but we can keep contributing source code to resolve your technical issues. I'd be glad to hear that anyone start using Oracle database and Oracle enhanced adapter with your Rails applications.

    Oracle Enhanced Adapterは、ActiveRecord 3rd partyデータベースアダプタです。Rails 2.3から4.1に対応しており、Rails 4への対応も4.0.1がリリースされた2013年11月1日と同日から対応するなど、着実なサポートが継続されており、現在はRails 4.2の対応が進んでいます。

    ご存じの通り、Railsの世界ではMySQLとPostgreSQLのふたつのデータベースが大きなシェアをもっており、Oracleの利用報告はごくわずかです。優れたオプティマイザなどの機能を持つ反面、NULLと空文字を同様に扱うなど、"標準"とはことなる独自の実装がなされてきましたが、近年では他データベースでの便利な機能やSQL標準の対応もされるようになりました。なかでも、Oracle 12cでは、row limits、offsetの対応が追加され、ようやくまともなTop-N queryが書けるようになりました。これにより、悩ましいArelでのorder_hacksが削除されたシンプルなArel実装を紹介します。

    私は2011年の8月からOracle enhanced adapterのRails4対応から、まだ最初の3年間ではありますが、燃え尽きることなくやってくることができました。 ライセンス費用は私にはどうすることもできませんが、Railsで利用するための技術的な課題が解決されることで、OracleをRailsのデータベースとして採用するきっかけとなれば幸いです。
  speakers:
    - Yasuo Honda

