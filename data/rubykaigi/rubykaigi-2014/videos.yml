- id: "jonathan-mukai-heidt-rubykaigi-2014"
  title: "Controller Testing: You’re Doing It Wrong"
  raw_title: "Controller Testing: You’re Doing It Wrong - RubyKaigi 2014"
  event_name: "RubyKaigi 2014"
  date: "2014-09-18"
  published_at: "2014-10-02T23:43:35Z"
  language: "English"
  track: "Hall B"
  slides_url: "http://www.slideshare.net/johnnygroundwork/controller-testing-youre-doing-it-wrong"
  video_provider: "youtube"
  video_id: "AuhX9DFu9v4"
  description: |-
    How do you feel about your controller testing strategy? Do you feel begrudgingly obligated to write them? Do you find yourself stubbing methods like find_by only to feel a vague sense of dissatisfaction? Is your test suite soul-crushingly slow because you’re relying on integration specs to test controllers? Do you write controller specs at all?

    Rails controllers are wonderfully idiomatic and declarative to the point of being almost redundant. This is a good thing; it keeps many concerns like authentication and server response consistent while keeping business logic in models where it belongs. But this same simplicity leaves many developers conflicted about how and what to test in controller specs. To properly test Rails controllers we need a testing strategy as declarative as the controllers themselves. Come find out how to write controller specs that are as simple and concise as well written Rails controllers!
  speakers:
    - Jonathan Mukai-Heidt

- id: "rei-odaira-rubykaigi-2014"
  title: "Eliminating Giant VM Lock in Ruby through Hardware Transactional Memory"
  raw_title: "Eliminating Giant VM Lock in Ruby through Hardware Transactional Memory - RubyKaigi 2014"
  event_name: "RubyKaigi 2014"
  date: "2014-09-18"
  published_at: "2014-10-02T12:16:51Z"
  language: "Japanese"
  track: "Hall A"
  video_provider: "youtube"
  video_id: "EA_yKAdjTA8"
  description: |-
    MRI uses a Giant VM Lock (GVL) to simplify its internal design, but this kind of lock lowers the multi-thread performance on multi-core machines. In this talk, I will show our results of eliminating the GVL of MRI using Hardware Transactional Memory (HTM). HTM is a new hardware feature implemented in recent CPUs and allows multiple threads to access shared data without using locks. Through HTM, multiple Ruby threads can execute (mostly) in parallel without any source code modification, and the execution results are still compatible with those of the original MRI. Our results show that HTM achieved 1.6- and 1.2-fold speedups in WEBrick and Ruby on Rails, respectively. A code patch for our changes will be made available shortly from our Web site.
  speakers:
    - Rei Odaira

- id: "rob-sanheim-rubykaigi-2014"
  title: "Continuous Delivery at GitHub"
  raw_title: "Continuous Delivery at GitHub - RubyKaigi 2014"
  event_name: "RubyKaigi 2014"
  date: "2014-09-18"
  published_at: "2014-10-02T23:43:58Z"
  language: "English"
  track: "Hall B"
  slides_url: "https://speakerdeck.com/rsanheim/continuous-delivery-at-github"
  video_provider: "youtube"
  video_id: "Rhvri5cozTc"
  description: |-
    Continuous Delivery (CD) is the practice of building software that is ready to be deployed to production at all times. CD requires a stable, automated build pipeline, with simple, push button deployments, guided by feedback and metrics on the health of the production system. By refining and shortening feedback loops throughout the entire software process, it is possible to continually be delivering high-quality, working software to happy customers.

    At GitHub, we deploy hundreds of times in the course of an average day. We practice continuous delivery from design, development and ops, through our release processes and into customer support. This talk will cover many of the techniques and tools we use for continuous delivery at GitHub, including pull requests, feature toggles, chat ops and continuous integration and deployment. We will also discuss core principles so you can apply these lessons in your own Ruby deployment environment, software process, and business.
  speakers:
    - Rob Sanheim

- id: "szu-kai-hsu-rubykaigi-2014"
  title: "Cores unleashed Part II: Introduction to GobiesVM (and Software Transactional Memory)"
  raw_title: "Cores unleashed Part II: Introduction to GobiesVM - RubyKaigi 2014"
  event_name: "RubyKaigi 2014"
  date: "2014-09-18"
  published_at: "2014-10-02T12:17:06Z"
  language: "English"
  track: "Hall A"
  slides_url: "https://speakerdeck.com/brucehsu/core-unleashed-part-ii-introduction-to-gobiesvm-and-stm-at-rubykaigi-2014"
  video_provider: "youtube"
  video_id: "PnL2VsZ623U"
  description: |-
    Parallelism in Ruby has been continuously, if not extensively, studied recently. Besides MRI which uses global interpreter lock to maintain thread-safety meanwhile eliminates the possibility to exploit multi-core processing power, most alternative Ruby implementations take the fine-grained lock approach for maximum CPU utilization. Yet traditional locking mechanism requires careful design or could cause poor performance and unpredictable results. Locking mechanism itself is also too sophisticated for general developers who wish to take advantage of modern hardware.

    GobiesVM aims to solve this dilemma via a state-of-the-art Software Transactional Memory (STM) approach. This talk will introduce architecture and internals of GobiesVM, the way STM works and how STM affects the performance regarding parallel Ruby programs.

    You can find GobiesVM at https://github.com/brucehsu/GobiesVM
  speakers:
    - Szu-Kai Hsu

