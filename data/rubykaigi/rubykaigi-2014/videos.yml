- id: "hiroshi-shibata-rubykaigi-2014"
  title: "The Twelve-factor Ruby 「Ruby を良くするための12のポイント」"
  raw_title: "The Twelve-factor Ruby 「Ruby を良くするための12のポイント」 - RubyKaigi 2014"
  event_name: "RubyKaigi 2014"
  date: "2014-09-19"
  published_at: "2014-10-04T00:14:26Z"
  language: "Japanese"
  track: "Hall B"
  slides_url: "https://speakerdeck.com/hsbt/the-twelve-factor-ruby"
  video_provider: "youtube"
  video_id: "PyzX4U4nvR8"
  description: |-
    How can we make Ruby programming more pleasant?

    This answer is simple. ”You should fix or develop Ruby”. Most people think that it's difficult to contribute or fix Ruby. Well, it is actually easy to contribute to or fix Ruby and many more people would be affected by your effort!

    Ruby committers started new development process such as call for new features, developer meeting couple of months, and more. I introduce these changes. One of big change is release cycle of Ruby. Now, Ruby will releasing every Christmas. Therefore, Your code is shipping to world every year via new version.

    How can you start fixing Ruby?

    I'll introduce the twelve-factor to get started in improving Ruby, such as contribute instructions, basicaly proposals of new features, writing documents, fixing websites, reporting defects and more.

    Ruby でより楽しくプログラミングするための方法は何でしょうか?

    その答えは “Ruby そのものを開発したり直したりすること” と言っても良いでしょう. 多くの人々にとって、Ruby を直したりコントリビュートすることはとても難しいものと考えられています。しかし、実はそれはとても簡単で、あなたの行動が多くの人々に影響を与えることも可能なのです。

    私を含む Ruby コミッタは新機能の追加の仕組みや開発者会議を定期開催するなど、新しい開発プロセスを積極的に取り入れています。中でも毎年クリスマスに定期リリースするという開発サイクルの変更はとても大きい変更です。つまり、Ruby のコードをコントリビュートすると毎年世界中にあなたのコードが配布されるということを意味しています。

    では Ruby を直すために何から始めればいいのでしょうか?

    Rubyにコントリビュートする時にはいくつかのお作法があります。お作法には新機能の提案の基本パターン、ドキュメントやウェブサイトの修正方法、より良いバグレポートの方法などが含まれています。本トークではRubyに受け入れられやすいコントリビュートの方法を12個に絞って取っておきの方法としてご紹介します。
  speakers:
    - Hiroshi SHIBATA

- id: "shota-fukumori-rubykaigi-2014"
  title: "Scalable deployments - How we deploy Rails app to 100+ hosts in a minute"
  raw_title: "Scalable deployments - How we deploy Rails app to 100+ hosts in a minute - RubyKaigi 2014"
  event_name: "RubyKaigi 2014"
  date: "2014-09-19"
  published_at: "2014-10-04T00:11:56Z"
  language: "Japanese"
  track: "Hall A"
  slides_url: "https://speakerdeck.com/sorah/scalable-deployments-how-we-deploy-rails-app-to-150-plus-hosts-in-a-minute"
  video_provider: "youtube"
  video_id: "m-LB3-T8YF4"
  description: |-
    If you're developing web apps, I guess you perform some deployments using tools like Capistrano. And we think the existing tools are slow for huge applications and a lot of servers.

    We serve cookpad.com, which is a huge Rails app, and the largest recipe site in Japan. It is now backed more than 100 app servers. We've used Capistrano with SSH and rsync, but it became a bottleneck, slower and slower, as well as the number of server increases.

    Our developer have wanted to focus on development, not an deployment. Deployments should be done in short time, and scalable for future server increases. Deployments should not steal a time from developers.

    And there is more one problem: we automate scaling out/in of servers. We've had to lock deploying during automated scaling out/in, to avoid deployed revision inconsistency. Developers should wait the completion of scaling in/out, so finally it makes duration of a deployment longer. We can't block servers' scaling. This problem can be solved in process of deployment.

    To solve these problems around deployment, we created a new tool – https://github.com/sorah/mamiya . In this talk, speaker talks about how we had deployed Rails app at past, and its problems, then introduce a new tool, that we use to deploy Rails app to more than 100 hosts in a minute.

    (This talk's spoken language will be Japanese, but slides will be provided in English.)
  speakers:
    - Shota Fukumori

- id: "amy-wibowo-rubykaigi-2014"
  title: "Sweaters as a Service"
  raw_title: "Sweaters as a Service - RubyKaigi 2014"
  event_name: "RubyKaigi 2014"
  date: "2014-09-19"
  published_at: "2014-10-04T00:14:38Z"
  language: "English"
  track: "Hall B"
  video_provider: "youtube"
  video_id: "spB6klBmW58"
  description: |-
    In the 1980's, Nintendo had plans for making a knitting add-on to the NES, with an interface that resembled Mariopaint, but with patterned mittens, sweaters, and scarves as output. Sadly, this product never saw the light of day. Devastated upon hearing this and dreaming about what could have been, a group of Airbnb engineers (who knew nothing about machine knitting) set out to hack a knitting machine from the 1980's to be computer-controlled, using a tutorial from adafruit as a starting point.

    Hear about our struggles and triumphs, which ranged from learning to replace knitting machine needles and conduct basic repairs, to emulating a floppy drive and hacking together a custom cable cable to send our own patterns to the machine, to writing our own yarn printer API in ruby/sinatra and printing our first doge meme in yarn. And watch us as we send images and knit requests to our yarn server, and behold as it knits ugly sweaters from those images!
  speakers:
    - Amy Wibowo

- id: "matsumoto-ryosuke-rubykaigi-2014"
  title: "Resource Control Architecture scripting with mruby for a Web Server Separating Computer Resources Virtually at Each HTTP Request"
  raw_title: "Resource Control Architecture scripting with mruby - RubyKaigi 2014"
  event_name: "RubyKaigi 2014"
  date: "2014-09-19"
  published_at: "2014-10-04T00:12:15Z"
  language: "Japanese"
  track: "Hall A"
  slides_url: "https://speakerdeck.com/matsumoto_r/rubykaigi-2014-mod-mruby-ngx-mruby"
  video_provider: "youtube"
  video_id: "zpisuAgndV4"
  description: |-
    As the increase of large-scale Web services, Web applications are increasingly sophisticated. The increase of smartphones makes traffic to Web servers increase each day. Management of Web servers is increasingly important. When a Web server receives resource-hungry requests, administrators of the web server must control the resources flexibly. However, existing resource control methods process mandatorily such as denial, disconnect or the like of the request when the number of simultaneous connections, request per unit time, CPU used time or memory utilization exceed a certain threshold value. These methods can’t control resources processing request. In this situation, if one request has the potential to occupy a majority of computer resources, the server process can process other request in principle by separating resources of the server process temporarily without using up the saving of computer resources. In this paper, we propose a resources control architecture scripting with mruby for a Web server separating computer resources virtually by a HTTP request using mod_mruby and mruby-cgroup. Each HTTP request processing is allocated virtual computer resources temporarily and the request is process within the limit of the allocated computer resources in our architecture. Therefore, each request processing has a very small effect if clients access to contents heavily or a particular content occupy a majority of computer resources. If a request has the potential to occupy a majority of computer resources, our architecture can process the request continually within the limit of the allocated computer resources without denying or disconnecting requests mandatorily.
  speakers:
    - MATSUMOTO Ryosuke

