- id: "kei-inoue-rubykaigi-2024"
  title: "How to implement a RubyVM with PHP?"
  raw_title: "[JA] How to implement a RubyVM with PHP? / memory @m3m0r7"
  event_name: "RubyKaigi 2024"
  date: "2024-05-17"
  published_at: "2024-08-23T05:58:49Z"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/m3m0r7/how-to-implement-a-rubyvm-with-php-rubykaigi2024"
  video_provider: "youtube"
  video_id: "6SLUW2PEoZY"
  description: |-
    Have you ever implemented a virtual machine (VM) of any kind? In the past, I implemented a Java Virtual Machine (JVM) using PHP. My current workplace primarily uses Ruby on Rails, but I am a beginner in both Ruby and Ruby on Rails.

    To better understand Ruby, I thought I needed some practical experience. Therefore, I decided to implement a RubyVM myself, using my experience of building a JVM with PHP. This project aims to deepen my understanding of Ruby and accelerate my learning process.

    In this presentation, I will discuss how to implement a RubyVM using PHP and cover the basics of VM implementation.

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/m3m0r7.html
  speakers:
    - Kei Inoue

- id: "kay-sawada-rubykaigi-2024"
  title: "Turning CDN edge into a Rack web server with ruby.wasm"
  raw_title: "[EN] Turning CDN edge into a Rack web server with ruby.wasm / Kay Sawada @remore"
  event_name: "RubyKaigi 2024"
  date: "2024-05-17"
  published_at: "2024-08-23T05:58:50Z"
  language: "English"
  slides_url: "https://speakerdeck.com/remore/turning-cdn-edge-into-a-rack-web-server-with-ruby-dot-wasm"
  video_provider: "youtube"
  video_id: "LciYstdyuhc"
  description: |-
    This is my story on how I started my side project to use CDN edge experimentally as a Rack web server for my personal Sinatra application.

    In this talk, we will explore how it works with a live demo, delve into how I experimentally migrated from my traditional Unicorn/Nginx setup, and discuss what it takes to develop an app in an edge computing environment. We'll also touch on a few practical aspects such as performance and limitations in the last half of the discussion so that you can learn what it's like to build your own Rack app taking advantage of the resilience and scalability of a globally distributed computing platform.

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/remore.html
  speakers:
    - Kay Sawada

- id: "aaron-patterson-rubykaigi-2024"
  title: "Speeding up Instance Variables with Red-Black Trees"
  raw_title: "[JA] Speeding up Instance Variables with Red-Black Trees / Aaron Patterson @tenderlove"
  event_name: "RubyKaigi 2024"
  date: "2024-05-17"
  published_at: "2024-08-23T05:58:54Z"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/tenderlove/speeding-up-instance-variables-in-ruby-3-dot-3"
  video_provider: "youtube"
  video_id: "dDvyYVjS5b0"
  description: |-
    The introduction of Object Shapes helped speed up cached instance variable reads as well as decreased the machine code required for JIT compilation. But what about cache misses? Is there any way we can speed up instance variable access in that case? Ruby 3.3 introduced a red-black tree cache to speed up instance variable cache misses. Let’s learn how instance variables are implemented, and how the red black tree cache speeds them up!

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/tenderlove.html
  speakers:
    - Aaron Patterson

- id: "mike-mcquaid-rubykaigi-2024"
  title: 'Using "modern" Ruby to Build a Better, Faster Homebrew'
  raw_title: '[EN] Using "modern" Ruby to build a better, faster Homebrew / Mike McQuaid @MikeMcQuaid'
  event_name: "RubyKaigi 2024"
  date: "2024-05-17"
  published_at: "2024-08-23T05:58:52Z"
  language: "English"
  slides_url: "https://speakerdeck.com/mikemcquaid/using-modern-ruby-to-build-a-better-faster-homebrew"
  video_provider: "youtube"
  video_id: "QDnaY0quYp0"
  description: |-
    Homebrew is a popular macOS package manager in the Ruby community and is also written in Ruby. When it was first created, it used the (fairly old) Ruby supplied by macOS and, until recently, has been tied to this version. Learn in this talk how and why Homebrew now ships its own Ruby to all users, modern Ruby tooling we now rely heavily on (e.g. Sorbet, RuboCop, etc.), how Ruby versions and our love of ActiveSupport have affected the performance of Homebrew and what we have planned in future to make Homebrew better, faster and more Ruby-like.

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/MikeMcQuaid.html
  speakers:
    - Mike McQuaid

- id: "charles-nutter-rubykaigi-2024"
  title: "JRuby 10: Ruby 3.3 on the Modern JVM"
  raw_title: "[EN] JRuby 10: Ruby 3.3 on the Modern JVM / Charles Nutter @headius"
  event_name: "RubyKaigi 2024"
  date: "2024-05-17"
  published_at: "2024-08-23T05:58:52Z"
  language: "English"
  slides_url: "https://speakerdeck.com/headius/jruby-10-ruby-3-dot-3-on-the-modern-jvm"
  video_provider: "youtube"
  video_id: "NXFRKetpF68"
  description: |-
    JRuby is the most widely deploy alternative Ruby in the world. Up through JRuby 9.4, we have maintained compatibility with old JVM versions, focusing on compatibility and support for legacy platforms. With JRuby 10, we're making a huge leap forward, with support for the latest JVM features (native functions and memory, true lightweight fibers, fast startup and warmup) and a complete set of Ruby 3.3 features (including the fiber scheduler, ractors, IO buffers, the prism parser, and more). We're pushing performance beyond anything we've done before. And we need your help to make this journey. Come see how JRuby brings the best of the modern JVM to Ruby, and how you can get involved.

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/headius.html
  speakers:
    - Charles Nutter

- id: "masatoshi-seki-rubykaigi-2024"
  title: "ERB, Ancient and Future"
  raw_title: "[JA] ERB, ancient and future / Masatoshi SEKI @m_seki"
  event_name: "RubyKaigi 2024"
  date: "2024-05-17"
  published_at: "2024-08-23T05:58:50Z"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/m_seki/erb-ancient-and-future"
  video_provider: "youtube"
  video_id: "4NYBtwLqits"
  description: |-
    ERB was released in 1999. 25th anniversary. In this talk, I will explain what I was thinking when designing the ERB API 25 years ago. I will also explain how supports block methods.

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/m_seki.html
  speakers:
    - Masatoshi SEKI

- id: "junichi-kobayashi-rubykaigi-2024"
  title: "From LALR to IELR: A Lrama's Next Step"
  raw_title: "[JA] From LALR to IELR: A Lrama's Next Step / Junichi Kobayashi @junk0612"
  event_name: "RubyKaigi 2024"
  date: "2024-05-17"
  published_at: "2024-08-23T05:58:49Z"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/junk0612/from-lalr-to-ielr-a-lramas-next-step"
  video_provider: "youtube"
  video_id: "8c7w7ecwGDc"
  description: |-
    In parse.y, there is a variable that represents the state of the Lexer, based on the idea that the Parser and the Lexer can be separated. However, in reality, the state of Parser and Lexer are shared and cannot be said to be separated. Also, the Lexer state is manually managed, but historical history has clouded the view, and additions and modifications must be done with care.

    With the replacement of the parser generator from Bison to Lrama, the time has come to attack parse.y from the parser generator side, and Lrama is trying to solve this problem by generating an algorithmic parser called PSLR. As a first step, I will show how Lrama can generate a parser for a new algorithm called IELR, which is a prerequisite for PSLR.

    IELR is an improved version of LALR and can parse grammars that LALR cannot. In this presentation, I will explain the implementation of Lrama and how the parser is actually generated.

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/junk0612.html
  speakers:
    - Junichi Kobayashi

- id: "emma-haruka-iwao-rubykaigi-2024"
  title: "Ruby and the World Record Pi Calculation"
  raw_title: "[EN] Ruby and the World Record Pi Calculation / Emma Haruka Iwao @Yuryu"
  event_name: "RubyKaigi 2024"
  date: "2024-05-17"
  published_at: "2024-08-23T05:58:52Z"
  language: "English"
  slides_url: "https://speakerdeck.com/yuryu/ruby-and-the-world-record-pi-calculation"
  video_provider: "youtube"
  video_id: "LvaX-3vvNMA"
  description: |-
    I broke the world record of pi calculations with 100 trillion digits. When I was preparing for the challenge, I created a small Ruby script and an ERB template for the calculation software config file to automate benchmarking, and a shell one-liner to create a CSV file for review. The script saved me days of manual work and allowed me to find optimal parameters. The final calculation took 157 days, almost twice as fast as the earliest configurations, which could’ve taken more than 300 days.

    This talk will show you how I turned the vague problem scope (breaking the pi world record) into a smaller solvable task (automation with Ruby). You’ll also learn scripting techniques for benchmarking such as invoking an external program in Ruby, and multiline text formatting with the sed, grep, and paste commands.

    You may not calculate pi, but I’m sure you have a thing or two that you want your computer to do for you!

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/Yuryu.html
  speakers:
    - Emma Haruka Iwao

- id: "kj-tsanaktsidis-rubykaigi-2024"
  title: "Finding and fixing memory safety bugs in C with ASAN"
  raw_title: "[EN] Finding and fixing memory safety bugs in C with ASAN / KJ Tsanaktsidis @KJTsanaktsidis"
  event_name: "RubyKaigi 2024"
  date: "2024-05-17"
  published_at: "2024-08-23T05:58:54Z"
  language: "English"
  slides_url: "https://docs.google.com/presentation/d/1pxadIOluKjlpuscaq4B3RBnD0mwy02v6Fp-2bt29QRU/edit#slide=id.g2d0dab1d345_0_3"
  video_provider: "youtube"
  video_id: "yM1us32z-9I"
  description: |-
    In order to deliver an experience of programmer happiness to users of Ruby, the developers of CRuby itself (as well as the authors of extension gems) must cut through the dangerous jungle of manual memory management in C. Simple mistakes in the use of pointers, or failing to follow the Ruby garbage collector's rules precisely, can work fine on development machines but cause rare, hard to debug crashes in production environments.

    ASAN (Address SANitizer) is a tool for instrumenting compiled code to catch invalid memory accesses as they happen and crash the program immediately, leading you straight to the buggy code. This is far easier to troubleshoot than crashing at some later point, when the memory corruption has caused some other, totally innocent code to crash!

    In this talk, you'll learn how to enable ASAN in your builds (of both Ruby itself and of extension gems), and how to interpret its output. We'll also cover a little bit about how ASAN works in CRuby.

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/KJTsanaktsidis.html
  speakers:
    - KJ Tsanaktsidis

- id: "ryota-egusa-rubykaigi-2024"
  title: "Porting mruby/c for the SNES (Super Famicom)"
  raw_title: "[JA] Porting mruby/c for the SNES (Super Famicom) / Ryota Egusa @gedorinku"
  event_name: "RubyKaigi 2024"
  date: "2024-05-17"
  published_at: "2024-08-23T05:58:54Z"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/gedorinku/c-for-the-snes-super-famicom-rubykaigi-2024"
  video_provider: "youtube"
  video_id: "iiauZuJnqlA"
  description: |-
    The SNES (Super Nintendo Entertainment System), released in the early 1990s, is known as the Super Famicom in Japan.

    I have worked on porting mruby/c to the SNES and successfully ran mruby/c code on it. In this presentation, along with an overview of the SNES's hardware, I will detail the process of porting mruby/c, and introduce how to develop games for the SNES using mruby/c.

    Moreover, a live demonstration using an actual SNES unit is also planned for this presentation.

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/gedorinku.html
  speakers:
    - Ryota Egusa

- id: "vladimir-dementyev-rubykaigi-2024"
  title: "Ruby Mixology 101: adding shots of PHP, Elixir, and more"
  raw_title: "[EN] Ruby Mixology 101: adding shots of PHP, Elixir, and more / Vladimir Dementyev @palkan_tula."
  event_name: "RubyKaigi 2024"
  date: "2024-05-17"
  published_at: "2024-08-23T05:58:53Z"
  language: "English"
  slides_url: "https://speakerdeck.com/palkan/rubykaigi-2024-ruby-mixology-101-adding-shots-of-php-elixir-and-more"
  video_provider: "youtube"
  video_id: "tfzAZiGGHvM"
  description: |-
    How often have you heard, “I wish Ruby had X from Y”? Developers tend to desire features they love in one language to be available in another. That’s why, for example, we got pattern matching and shorthand Hashes added to Ruby. What’s next? What will inspire the next Ruby syntax addition? Crystal? Elixir? Zig (have you heard about it)? PHP (why not)?

    Let’s embark on a fantastic journey of exploring syntax features from other languages, such as method overloading or null coalescing assignment, and how to port them to Ruby. But why is it fantastic? I want to turn fantasy into reality and show how we can experiment with Ruby syntax additions without waiting for official releases with experimental features.

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/palkan_tula.html
  speakers:
    - Vladimir Dementyev

- id: "hiroya-fujinami-rubykaigi-2024"
  title: "Make Your Own Regex Engine!"
  raw_title: "[JA] Make Your Own Regex Engine! / Hiroya FUJINAMI @makenowjust"
  event_name: "RubyKaigi 2024"
  date: "2024-05-17"
  published_at: "2024-08-23T05:58:54Z"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/makenowjust/rubykaigi-2024-make-your-own-regex-engine"
  video_provider: "youtube"
  video_id: "kaN1NqhL7VI"
  description: |-
    Regular expression (regex) is a critical feature in Ruby. However, developers often say, "Regex is complicated and causes bugs.", so they avoid using regex. This seems to be due to their incorrect understanding of how regex matching works. The behavior of regex matching is actually simple, and a small regex engine (kantan-regex) can be implemented in a program of less than 300 lines.

    In this talk, I will describe the behavior of regex matching through the implementation of kantan-regex. Furthermore, I will show how, with a few modifications, extensions such as look-around and optimizations such as memoization can be easily implemented. We believe that this talk will help to deepen our understanding of regex implementations and make using regex in everyday life more enjoyable.

    A tutorial on implementing kantan-regex is available on Web (Japanese only).

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/makenowjust.html
  speakers:
    - Hiroya Fujinami

- id: "shigeru-nakajima-rubykaigi-2024"
  title: "Using Ruby in The Browser is Wonderful."
  raw_title: "[JA] Using Ruby in the browser is wonderful. / Shigeru Nakajima @ledsun"
  event_name: "RubyKaigi 2024"
  date: "2024-05-17"
  published_at: "2024-08-23T05:58:52Z"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/ledsun/using-ruby-in-the-browser-is-wonderful"
  video_provider: "youtube"
  video_id: "PDTz9QOHBFo"
  description: |-
    Ruby 3.2 released ruby.wasm, allowing Ruby to run in the browser as WebAssembly. Several features were missing for comfortable programming. For example, require_relative to load other scripts, the new method to initialize JavaScript objects, and some converters between Ruby and JavaScript. I wrote three Ruby programs for the browser, found the missing features, and implemented them. I will introduce my work on ruby.wasm and talk a bit about features I will add in the future. Those who listen to this talk will feel that using Ruby in the browser is wonderful.

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/ledsun.html
  speakers:
    - Shigeru Nakajima

- id: "vinicius-stock-rubykaigi-2024"
  title: "The State of Ruby Dev Tooling"
  raw_title: "[EN] The state of Ruby dev tooling / Vinicius Stock @vinistock"
  event_name: "RubyKaigi 2024"
  date: "2024-05-17"
  published_at: "2024-08-23T05:58:53Z"
  language: "English"
  slides_url: "https://speakerdeck.com/vinistock/the-state-of-ruby-tooling"
  video_provider: "youtube"
  video_id: "qhp04EwmIjo"
  description: |-
    During the last few years, the Ruby community invested significant effort into improving developer tooling. A lot of this effort has been divergent; trying out many solutions to find out what works best and fits Rubyists expectations.

    So where are we at this point? How do we compare to other ecosystems? Is it time to converge, unite efforts and reduce fragmentation? And where are we going next? Let’s analyze the full picture of Ruby developer tooling and try to answer these questions together.

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/vinistock.html
  speakers:
    - Vinicius Stock

