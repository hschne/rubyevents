- id: "takashi-kokubun-rubykaigi-2024"
  title: "YJIT Makes Rails 1.7x Faster"
  raw_title: "[EN] YJIT Makes Rails 1.7x Faster / Takashi Kokubun @k0kubun"
  event_name: "RubyKaigi 2024"
  date: "2024-05-17"
  published_at: "2024-08-23T05:58:53Z"
  language: "English"
  slides_url: "https://speakerdeck.com/k0kubun/rubykaigi-2024"
