- id: "masato-ohba-rubykaigi-2024"
  title: "Unlocking Potential of Property Based Testing with Ractor"
  raw_title: "[JA] Unlocking Potential of Property Based Testing with Ractor / Masato Ohba @ohbarye"
  event_name: "RubyKaigi 2024"
  date: "2024-05-15"
  published_at: "2024-08-23T05:59:48Z"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/ohbarye/unlocking-potential-of-property-based-testing-with-ractor"
  video_provider: "youtube"
  video_id: "UljjMq86OUI"
  description: |-
    Ruby's ease in test-writing and its rich ecosystem are widely acclaimed. However, traditional testing methods, relying on developer-created cases, often miss edge-case bugs. This talk introduces a testing method and a tool to generate numerous cases automatically, known as 'property based testing'. It's not only a transformative solution to detect bugs but also a nice use case of Ractor because the tool generates dozens to hundreds of cases that can run in parallel.

    I'll explore how Ractor enables efficient execution of property based testing through parallel processing. This combination promises faster, more comprehensive testing, reducing reliance on developer expertise for bug detection. This talk aims to unlock Ruby's full testing potential by highlighting the not-well-known test method.

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/ohbarye.html
  speakers:
    - Masato Ohba

- id: "samuel-giddins-rubykaigi-2024"
  title: "Remembering (ok, not really Sarah) Marshal"
  raw_title: "[EN] Remembering (ok, not really Sarah) Marshal / Samuel Giddins @segiddins"
  event_name: "RubyKaigi 2024"
  date: "2024-05-15"
  published_at: "2024-08-23T05:59:49Z"
  language: "English"
  video_provider: "youtube"
  video_id: "mi6XhlDPmsA"
  description: |-
    Though the Marshal serialization format has fallen out of favor over the past decade, due to a lack cross-language interoperability and security vulnerabilities, I think there’s a lot to learn from it. Having recently reimplemented Marshal.load to sidestep the security concerns, I want to reintroduce the Ruby community to the gem (see what I did there?) that is binary serialization. Let’s walk through how Marshal works under the hood, and see what ideas from it we can salvage for a modern take on data serialization.

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/segiddins.html
  speakers:
    - Samuel Giddins

- id: "matt-valentine-house-rubykaigi-2024"
  title: "Strings! Interpolation, Optimisation & Bugs"
  raw_title: "[EN] Strings! Interpolation, Optimisation & Bugs / Matt Valentine-House @eightbitraptor"
  event_name: "RubyKaigi 2024"
  date: "2024-05-15"
  published_at: "2024-08-23T05:59:48Z"
  language: "English"
  slides_url: "https://www.eightbitraptor.com/presentations/RubyKaigi2024-MVH.pdf"
  video_provider: "youtube"
  video_id: "CLIqUDqVTC8"
  description: |-
    Join me as we look at how removing 8 lines of code allowed us to speed up some classes of string interpolation by 2x.

    This talk will dive into String interpolation: How interpolations are parsed and compiled, and some of the optimisations that are applied to them.

    Then we'll see how a change in the Ruby memory layout caused one of these optimisations to degrade performance, how we found the problem and what we did to fix it!

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/eightbitraptor.html
  speakers:
    - Matt Valentine-House

- id: "hiroshi-shibata-rubykaigi-2024"
  title: "Long journey of Ruby standard library"
  raw_title: "[JA] Long journey of Ruby standard library / Hiroshi SHIBATA @hsbt"
  event_name: "RubyKaigi 2024"
  date: "2024-05-15"
  published_at: "2024-08-23T05:59:51Z"
  language: "Japanese"
  slides_url: "https://www.slideshare.net/slideshow/long-journey-of-ruby-standard-library-at-rubykaigi-2024/268585781"
  video_provider: "youtube"
  video_id: "uRYuFyNR9PU"
  description: |-
    Ruby has a lot of standard libraries from Ruby 1.8. I promote them democratically with GitHub today via default and bundled gems. So, I'm working to extract them for Ruby 3.4 continuously and future versions. It's long journey for me.

    After that, some versions may suddenly happen LoadError at require when running bundle exec or bin/rails, for example matrix or net-smtp. We need to learn what's difference default/bundled gems with standard libraries.

    In this presentation, I will introduce what's the difficult to extract bundled gems from default gems and the details of the functionality that Ruby's require and bundle exec with default/bundled gems. You can learn how handle your issue about standard libraries.

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/hsbt.html
  speakers:
    - Hiroshi SHIBATA

- id: "yuji-yokoo-rubykaigi-2024"
  title: "Cross-platform mruby on Sega Dreamcast and Nintendo Wii"
  raw_title: "[EN] Cross-platform mruby on Sega Dreamcast and Nintendo Wii / Yuji Yokoo @yujiyokoo"
  event_name: "RubyKaigi 2024"
  date: "2024-05-15"
  published_at: "2024-08-23T05:59:49Z"
  language: "English"
  slides_url: "https://github.com/yujiyokoo/dreampresent-wii/releases/tag/RubyKaigi-2024"
  video_provider: "youtube"
  video_id: "n4cIKfXytEI"
  description: |-
    Do you remember Nintendo Wii? It was a very successful video game console released in 2006. You can now write mruby code that runs on Nintendo Wii, with no hardware modification required. As mruby runs on Sega Dreamcast too, now you can write mruby code that runs on both Dreamcast and Wii (with caveats).

    I have ported the mruby block puzzle game I wrote for Dreamcast to Wii, and now I am porting the presentation application I used to present on Dreamcast at RubyKaigi Takeout 2020. The aim is to run the same mruby code on those 2 platforms with no or little modification.

    In this presentation, I will show you how I have done / am doing the porting work, and how you can write your own cross-platform mruby code for those 2 platforms.

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/yujiyokoo.html
  speakers:
    - Yuji Yokoo

- id: "satoshi-moris-tagomori-rubykaigi-2024"
  title: "Namespace, What and Why"
  raw_title: "[JA] Namespace, What and Why / Satoshi Tagomori @tagomoris"
  event_name: "RubyKaigi 2024"
  date: "2024-05-15"
  published_at: "2024-08-23T05:59:48Z"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/tagomoris/namespace-what-and-why"
  video_provider: "youtube"
  video_id: "M4MDbxuFZyc"
  description: |-
    Namespace is a feature in development to separate Ruby code, native extensions, and gems into separate spaces. The expected benefits of this feature are:

    * Making codes and libraries name-collision-free
    * Having isolated Module/Class instances
    * Loading different versions of libraries on a Ruby process

    This talk will introduce what the namespace is (will be), why I want this feature in Ruby, and how it will help your applications.

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/tagomoris.html
  speakers:
    - "Satoshi \"moris\" Tagomori"

- id: "shunsuke-mori-rubykaigi-2024"
  title: "Let's use LLMs from Ruby 〜 Refine RBS types using LLM 〜"
  raw_title: "[JA] Let's use LLMs from Ruby 〜 Refine RBS types using LLM 〜 / Shunsuke Mori (kokuyou) @kokuyouwind"
  event_name: "RubyKaigi 2024"
  date: "2024-05-15"
  published_at: "2024-08-23T05:59:48Z"
  language: "Japanese"
  slides_url: "https://slides.com/kokuyouwind/lets-use-llms-from-ruby"
  video_provider: "youtube"
  video_id: "M2zvcq5VBwo"
  description: |-
    Large Language Models (LLMs) have evolved rapidly over the past few years and there have already been many practical applications in a variety of fields.

    Though Python is recognized as a de facto standard language to use LLMs, we are Rubyists so we would like to explore how we use LLMs in the Ruby language.

    In this session, I will explain the basics of Large Language Models(LLMs), and then cover Langchain.rb as a tool to use LLMs from the Ruby language.

    The development of RBS Goose, which is a tool to refine RBS type signatures, is a good practical example. We’ll share how it works including prompt construction, as well as the tips for LLMs development and our evaluation of its performance, including accuracy and speed, at the combination of various prompts, Few-Shot examples, and LLMs.

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/kokuyouwind.html
  speakers:
    - Shunsuke Mori

- id: "daisuke-aritomo-rubykaigi-2024"
  title: "The Depths of Profiling Ruby"
  raw_title: "[EN] The depths of profiling Ruby / Daisuke Aritomo @osyoyu"
  event_name: "RubyKaigi 2024"
  date: "2024-05-15"
  published_at: "2024-08-23T05:59:48Z"
  language: "English"
  slides_url: "https://speakerdeck.com/osyoyu/the-depthes-of-profiling-ruby-rubykaigi-2024"
  video_provider: "youtube"
  video_id: "NkNlg8YdZHU"
  description: |-
    Useful profilers are capable of accurately tracking program execution and providing sleek visualization, with minimal performance impact. When it comes to Ruby profilers, advanced features such as merging Ruby-level and C-level stacks or recording GC / GVL events would be also wanted.

    There were many challenges in implementing these features in Pf2, my experimental Ruby profiler. In this talk, I will visit the internals of CRuby and present the difficulties in creating a profiler for the interpreter.

    In this talk, I'll discuss the difficulties of creating a Ruby profiler through exploring the internals of CRuby, and introduce Pf2's design choices to overcome challenges. Let us discuss the future of profiling Ruby!

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/osyoyu.html
  speakers:
    - Daisuke Aritomo

- id: "john-hawthorn-rubykaigi-2024"
  title: "Vernier: A next generation profiler for CRuby"
  raw_title: "[EN] Vernier: A next generation profiler for CRuby / John Hawthorn @jhawthorn"
  event_name: "RubyKaigi 2024"
  date: "2024-05-15"
  published_at: "2024-08-23T05:59:48Z"
  language: "English"
  slides_url: "https://speakerdeck.com/jhawthorn/vernier-a-next-generation-cruby-profiler-rubykaigi-2024"
  video_provider: "youtube"
  video_id: "QSjN-H4hGsM"
  description: |-
    A good profiler is essential to making faster code.

    Vernier is a new profiler for CRuby 3.2+ which uses new techniques and new APIs in Ruby with more detailed and more accurate results than existing tools. It supports threads (including N:M), ractors, GVL activity, Garbage Collection, idle time, and more!

    In this talk I'll explain the challenges we faced with existing profilers, tradeoffs and changes previously made to stackprof, the new techniques Vernier uses, and how more visibility in what code is run may change how we write Ruby for the better.

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/jhawthorn.html
  speakers:
    - John Hawthorn

- id: "mari-imaizumi-rubykaigi-2024"
  title: "Exploring Reline: Enhancing Command Line Usability"
  raw_title: "[JA] Exploring Reline: Enhancing Command Line Usability / Mari Imaizumi @ima1zumi"
  event_name: "RubyKaigi 2024"
  date: "2024-05-15"
  published_at: "2024-08-23T05:59:48Z"
