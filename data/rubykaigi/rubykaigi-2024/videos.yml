- id: "koichi-sasada-rubykaigi-2024"
  title: "Ractor Enhancements, 2024"
  raw_title: "[EN] Ractor Enhancements, 2024 / Koichi Sasada @ko1"
  event_name: "RubyKaigi 2024"
  date: "2024-05-15"
  published_at: "2024-08-23T05:59:49Z"
  language: "English"
  slides_url: "https://www.atdot.net/~ko1/activities/2024_rubykaigi.pdf"
  video_provider: "youtube"
  video_id: "hzuNr0VnuKM"
  description: |-
    This talk presents recent updates to Ractor, which enables parallel and concurrent programming on Ruby.

    Ractor still lacks fundamental features. For example, we cannot use “require” method and “timeout” methods on non-main Ractors because of synchronization and implementation issues. We will discuss such problems and how to solve them.

    From a performance point of view, we have introduced the M:N thread scheduler in Ruby 3.3 and we will show the performance analysis with recent improvements.

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/ko1.html
  speakers:
    - Koichi Sasada

- id: "misaki-shioi-rubykaigi-2024"
  title: "An Adventure of Happy Eyeballs"
  raw_title: "[JA] An adventure of Happy Eyeballs / Misaki Shioi @coe401_"
  event_name: "RubyKaigi 2024"
  date: "2024-05-15"
  published_at: "2024-08-23T05:59:48Z"
  language: "Japanese"
  slides_url: "https://speakerdeck.com/coe401_/an-adventure-of-happy-eyeballs"
  video_provider: "youtube"
  video_id: "HU-kfUxM2lc"
  description: |-
    The Ruby socket library, familiar to many, actually has an issue: it cannot quickly fallback to the other address family if it fails to resolve names or connect in either IPv6 or IPv4.

    I am challenging this with Happy Eyeballs Version 2 (HEv2) algorithm specified in RFC8305. The algorithm performs name resolution for IPv6 and IPv4 almost simultaneously, prioritizing IPv6 but enabling fallback to IPv4. This sounds like a simple and nice idea!

    However, as I started the implementation, I realized that understanding the complex properties of HEv2, devising strategies to solve issues, and programming it is a kind of adventure.

    In this presentation, I will talk about how to get through them and how interesting it is to implement dual-stack support for socket libraries.

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/coe401_.html
  speakers:
    - Misaki Shioi

