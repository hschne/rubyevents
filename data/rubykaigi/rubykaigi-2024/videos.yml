- id: "matt-muller-rubykaigi-2024"
  title: "Generating a custom SDK for your web service or Rails API"
  raw_title: "[EN] Generating a custom SDK for your web service or Rails API / Matt Muller @mullermp"
  event_name: "RubyKaigi 2024"
  date: "2024-05-15"
  published_at: "2024-08-23T05:59:51Z"
  language: "English"
  slides_url: "https://www.slideshare.net/slideshow/generating-a-custom-ruby-sdk-for-your-web-service-or-rails-api-using-smithy/269389846"
  video_provider: "youtube"
  video_id: "wTOrDRrahuM"
  description: |-
    Have you ever wanted a Ruby client API to communicate with your web service? Smithy is a protocol-agnostic language for defining services and SDKs. Smithy Ruby is an implementation of Smithy that generates a Ruby SDK using a Smithy model. In this talk, we will explore Smithy and Smithy Ruby to learn how to generate custom feature-rich SDKs that can communicate with any web service, such as a Rails JSON API.

    RubyKaigi 2024: https://rubykaigi.org/2024/presentations/mullermp.html
