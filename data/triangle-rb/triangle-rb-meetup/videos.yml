  description: |-
    About the Meetup

    Time: 7:00

    Come socialize at 6:45. The official meeting starts at 7:00. Hang out at Sammy's after the meeting. Come to Baja Burrito at 5:30 if you'd like to join us for dinner.

    Where: WebAssign (new location)

    About the Talk

    Presenters: Michael Stalker and Joseph Jaber from SciMed Solutions

    Wikipedia says, "Metaprogramming is the writing of computer programs that write or manipulate other programs (or themselves) as their data...In some cases, this allows programmers to minimize the number of lines of code to express a solution (hence reducing development time), or it gives programs greater flexibility to efficiently handle new situations..."

    Come join us, and you'll learn how to use some of Ruby's metaprogramming capabilities. We'll give an overview of metaprogramming, as well as practical examples to illustrate the concepts. We'll also cover some pros and cons to using metaprogramming in your Ruby apps.
