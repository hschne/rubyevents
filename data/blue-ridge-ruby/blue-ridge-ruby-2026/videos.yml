- id: "john-athayde-blue-ridge-ruby-2026"
  title: "Learning from Permaculture: Sustainable Software Development"
  date: "2026-04-30"
  published_at: "2026-05-22T13:34:08Z"
  video_provider: "youtube"
  video_id: "oPD_uw_bLgQ"
  description: |-
